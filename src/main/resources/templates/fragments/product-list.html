<div th:fragment="productList" xmlns:th="http://www.thymeleaf.org">

    <div class="row" th:if="${!products.isEmpty()}">
        <div class="col-12 col-sm-6 col-lg-4 mb-4" th:each="product : ${products}">
            <div class="card h-100 shadow-sm">

                <img th:src="${product.imageUrl}"
                     th:alt="${product.name}"
                     class="card-img-top"
                     style="height: 220px; object-fit: cover;">

                <div class="card-body d-flex flex-column">
                    <h2 class="h5 card-title" th:text="${product.name}">Product name</h2>

                    <p class="card-text" th:text="${product.description}">
                        Product description
                    </p>

                    <p class="mb-1">
                        <strong>Category:</strong>
                        <span th:text="${product.categoryName}">Category</span>
                    </p>

                    <p class="mb-1">
                        <strong>Price:</strong>
                        €<span th:text="${product.price}">0.00</span>
                    </p>

                    <p class="mb-3">
                        <strong>Stock:</strong>
                        <span th:text="${product.stockQuantity}">0</span>
                    </p>

                    <form th:action="@{/cart/add}" method="post" class="mt-auto">
                        <input type="hidden" name="productName" th:value="${product.name}">

                        <div class="input-group">
                            <input type="number"
                                   name="quantity"
                                   value="1"
                                   min="1"
                                   class="form-control"
                                   aria-label="Quantity">

                            <button type="submit" class="btn btn-success">
                                Add to cart
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-info" th:if="${products.isEmpty()}">
        No products found for this category.
    </div>

</div>
