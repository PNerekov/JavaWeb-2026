<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Orders</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="mb-4">
        <h1 class="mb-1">Admin Orders</h1>
        <p class="text-muted mb-0">
            Search purchase history by customer and purchase date period.
        </p>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">
            Search orders
        </div>

        <div class="card-body">
            <form th:action="@{/admin/orders}"
                  th:object="${historySearchForm}"
                  method="post">

                <div class="row g-3 align-items-end">
                    <div class="col-12 col-md-4">
                        <label for="username" class="form-label">Customer username</label>
                        <input type="text"
                               id="username"
                               th:field="*{username}"
                               class="form-control"
                               placeholder="user, admin...">
                    </div>

                    <div class="col-12 col-md-3">
                        <label for="dateFrom" class="form-label">Date from</label>
                        <input type="date"
                               id="dateFrom"
                               th:field="*{dateFrom}"
                               class="form-control">
                    </div>

                    <div class="col-12 col-md-3">
                        <label for="dateTo" class="form-label">Date to</label>
                        <input type="date"
                               id="dateTo"
                               th:field="*{dateTo}"
                               class="form-control">
                    </div>

                    <div class="col-12 col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary">
                            Search
                        </button>
                    </div>
                </div>

                <div class="mt-3">
                    <a class="btn btn-outline-secondary btn-sm"
                       th:href="@{/admin/orders}">
                        Reset
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div class="alert alert-info"
         th:if="${#lists.isEmpty(orders)}">
        No orders found.
    </div>

    <div th:each="order : ${orders}" class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div>
                <strong>Order #<span th:text="${order.id}">1</span></strong>
                <span class="text-muted ms-2"
                      th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">
                    date
                </span>
            </div>

            <span class="badge bg-secondary"
                  th:text="${order.status}">
                status
            </span>
        </div>

        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-4">
                    <strong>Customer:</strong>
                    <span th:text="${order.user.name}">username</span>
                </div>

                <div class="col-md-4">
                    <strong>Payment:</strong>
                    <span th:text="${order.paymentMethod}">payment</span>
                </div>

                <div class="col-md-4">
                    <strong>Total:</strong>
                    €<span th:text="${order.totalPrice}">0.00</span>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-sm align-middle">
                    <thead>
                    <tr>
                        <th scope="col">Product</th>
                        <th scope="col">Price</th>
                        <th scope="col">Quantity</th>
                        <th scope="col">Subtotal</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="item : ${order.orderItems}">
                        <td th:text="${item.productName}">Product</td>
                        <td>€<span th:text="${item.productPrice}">0.00</span></td>
                        <td th:text="${item.quantity}">1</td>
                        <td>€<span th:text="${item.subtotal}">0.00</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
