<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login History</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="mb-4">
        <h1 class="mb-1">Login History</h1>
        <p class="text-muted mb-0">Search user login records by username and date period.</p>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">
            Search login history
        </div>

        <div class="card-body">
            <form th:action="@{/admin/login-history}"
                  th:object="${historySearchForm}"
                  method="post">

                <div class="row g-3 align-items-end">
                    <div class="col-12 col-md-4">
                        <label for="username" class="form-label">Username</label>
                        <input type="text"
                               id="username"
                               th:field="*{username}"
                               class="form-control"
                               placeholder="admin, user...">
                    </div>

                    <div class="col-12 col-md-3">
                        <label for="dateFrom" class="form-label">Date from</label>
                        <input type="date"
                               id="dateFrom"
                               th:field="*{dateFrom}"
                               class="form-control">
                    </div>

                    <div class="col-12 col-md-3">
                        <label for="dateTo" class="form-label">Date to</label>
                        <input type="date"
                               id="dateTo"
                               th:field="*{dateTo}"
                               class="form-control">
                    </div>

                    <div class="col-12 col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary">
                            Search
                        </button>
                    </div>
                </div>

                <div class="mt-3">
                    <a class="btn btn-outline-secondary btn-sm"
                       th:href="@{/admin/login-history}">
                        Reset
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header">
            Login records
        </div>

        <div class="card-body">
            <div class="alert alert-info"
                 th:if="${#lists.isEmpty(loginHistoryRecords)}">
                No login records found.
            </div>

            <div class="table-responsive"
                 th:if="${!#lists.isEmpty(loginHistoryRecords)}">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th scope="col">Username</th>
                        <th scope="col">Login time</th>
                        <th scope="col">IP address</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="record : ${loginHistoryRecords}">
                        <td th:text="${record.user.name}">username</td>

                        <td th:text="${#temporals.format(record.loginTime, 'dd.MM.yyyy HH:mm:ss')}">
                            login time
                        </td>

                        <td th:text="${record.ip}">ip</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
