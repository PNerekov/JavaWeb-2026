<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="mb-4">
        <h1 class="mb-1">Edit Product</h1>
        <p class="text-muted mb-0">Update existing product information.</p>
    </div>

    <div class="alert alert-danger"
         th:if="${errorMessage}"
         th:text="${errorMessage}">
        Error message
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/products/edit}"
                  th:object="${productDTO}"
                  method="post">

                <input type="hidden" name="oldProductName" th:value="${oldProductName}">

                <div class="mb-3">
                    <label for="name" class="form-label">Product name</label>
                    <input type="text"
                           id="name"
                           th:field="*{name}"
                           class="form-control">
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                        Name error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="categoryName" class="form-label">Category</label>
                    <select id="categoryName"
                            th:field="*{categoryName}"
                            class="form-select">
                        <option value="">Choose category</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.name}"
                                th:text="${category.name}">
                            Category
                        </option>
                    </select>
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('categoryName')}"
                         th:errors="*{categoryName}">
                        Category error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description"
                              th:field="*{description}"
                              class="form-control">
                    </textarea>
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}">
                        Description error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Price</label>
                    <input type="number"
                           step="0.01"
                           id="price"
                           th:field="*{price}"
                           class="form-control">
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('price')}"
                         th:errors="*{price}">
                        Price error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="stockQuantity" class="form-label">Stock quantity</label>
                    <input type="number"
                           id="stockQuantity"
                           th:field="*{stockQuantity}"
                           class="form-control">
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('stockQuantity')}"
                         th:errors="*{stockQuantity}">
                        Stock error
                    </div>
                </div>

                <div class="mb-3">
                    <label for="imageUrl" class="form-label">Image URL</label>
                    <input type="text"
                           id="imageUrl"
                           th:field="*{imageUrl}"
                           class="form-control">
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('imageUrl')}"
                         th:errors="*{imageUrl}">
                        Image URL error
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        Save changes
                    </button>

                    <a class="btn btn-outline-secondary" th:href="@{/admin/products}">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
