<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}">
        Error message
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">
        Success message
    </div>

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
        <div>
            <h1 class="mb-1">Products</h1>
            <p class="text-muted mb-0">Browse our available products by category.</p>
        </div>

        <div class="mt-3 mt-md-0">
            <span class="badge text-bg-primary fs-6">
                Selected category:
                <span id="selected-category" th:text="${selectedCategory}">All</span>
            </span>
        </div>
    </div>

    <div class="mb-4">
        <a class="btn btn-primary me-2 mb-2 category-filter"
           th:href="@{/products}"
           data-category="">
            All
        </a>

        <a class="btn btn-outline-primary me-2 mb-2 category-filter"
           th:each="category : ${categories}"
           th:href="@{/products/category/{categoryName}(categoryName=${category.name})}"
           th:data-category="${category.name}"
           th:text="${category.name}">
            Category
        </a>
    </div>

    <div id="product-list-container">
        <div th:replace="~{fragments/product-list :: productList}"></div>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>

<script>
    document.querySelectorAll(".category-filter").forEach(function (link) {
        link.addEventListener("click", function (event) {
            event.preventDefault();

            const categoryName = link.getAttribute("data-category");
            const selectedCategoryElement = document.getElementById("selected-category");
            const productListContainer = document.getElementById("product-list-container");

            let url = "/products/list";

            if (categoryName) {
                url += "?categoryName=" + encodeURIComponent(categoryName);
            }

            fetch(url)
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("Could not load products.");
                    }

                    return response.text();
                })
                .then(function (html) {
                    productListContainer.innerHTML = html;
                    selectedCategoryElement.textContent = categoryName || "All";

                    document.querySelectorAll(".category-filter").forEach(function (button) {
                        button.classList.remove("btn-primary");
                        button.classList.add("btn-outline-primary");
                    });

                    link.classList.remove("btn-outline-primary");
                    link.classList.add("btn-primary");
                })
                .catch(function () {
                    productListContainer.innerHTML =
                        "<div class='alert alert-danger'>Could not load products. Please try again.</div>";
                });
        });
    });
</script>

</body>
</html>
