<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
        <div>
            <h1 class="mb-1">My Orders</h1>
            <p class="text-muted mb-0">Review your previous purchases.</p>
        </div>

        <a class="btn btn-outline-primary mt-3 mt-md-0" th:href="@{/products}">
            Continue shopping
        </a>
    </div>

    <div th:if="${orders.isEmpty()}" class="alert alert-info">
        You do not have any orders yet.
    </div>

    <div th:if="${!orders.isEmpty()}">

        <div class="card mb-4 shadow-sm" th:each="order : ${orders}">
            <div class="card-header d-flex flex-column flex-md-row justify-content-between">
                <div>
                    <strong>Order #</strong>
                    <span th:text="${order.id}">1</span>
                </div>

                <div>
                    <strong>Date:</strong>
                    <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">
                        01.01.2026 12:00
                    </span>
                </div>
            </div>

            <div class="card-body">

                <div class="row mb-3">
                    <div class="col-12 col-md-4">
                        <strong>Payment method:</strong>
                        <span th:text="${order.paymentMethod}">CASH_ON_DELIVERY</span>
                    </div>

                    <div class="col-12 col-md-4">
                        <strong>Status:</strong>
                        <span th:text="${order.status}">COMPLETED</span>
                    </div>

                    <div class="col-12 col-md-4">
                        <strong>Total:</strong>
                        €<span th:text="${order.totalPrice}">0.00</span>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-sm align-middle">
                        <thead>
                        <tr>
                            <th scope="col">Product</th>
                            <th scope="col">Price</th>
                            <th scope="col">Quantity</th>
                            <th scope="col">Subtotal</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="item : ${order.orderItems}">
                            <td th:text="${item.productName}">Product name</td>

                            <td>
                                €<span th:text="${item.productPrice}">0.00</span>
                            </td>

                            <td th:text="${item.quantity}">1</td>

                            <td>
                                €<span th:text="${item.subtotal}">0.00</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
